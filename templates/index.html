<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crop Yield Prediction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='m_style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>

<body>

    <h1 class="text-center text-white">🌾 Crop Yield Prediction</h1>

    <div class="container">
        <div class="main-card mx-auto w-75">

            <h4 class="text-center text-success mb-4">
                Enter Crop Information
            </h4>

            <form action="/predict" method="POST">
                <table>
                    <tbody>

                        <tr>
                            <td>
                                <div class="form-group">
                                    <label for="Taluka_Name">Enter Taluka Here</label>
                                    <input type="text" class="form-control" name="taluka_name" required>
                                </div>
                            </td>

                            <td>
                                <div class="form-group">
                                    <label for="Crop_Varieties">Enter Crop Variety Here</label>
                                    <input type="text" class="form-control" name="crop_varieties" required>
                                </div>
                            </td>
                        </tr>

                        <tr>
                            <td>
                                <div class="form-group">
                                    <label for="N_kg_ha">Enter Proportion of Nitrogen</label>
                                    <input type="number" class="form-control" name="n_kg_ha" step="any" required>
                                </div>
                            </td>

                            <td>
                                <div class="form-group">
                                    <label for="P_kg_ha">Enter Proportion of Phosphorous</label>
                                    <input type="number" class="form-control" name="p_kg_ha" step="any" required>
                                </div>
                            </td>
                        </tr>

                        <tr>
                            <td>
                                <div class="form-group">
                                    <label for="K_kg_ha">Enter Proportion of Potassium</label>
                                    <input type="number" class="form-control" name="k_kg_ha" step="any" required>
                                </div>
                            </td>

                            <td>
                                <div class="form-group">
                                    <label for="pH">Enter pH of the Soil</label>
                                    <input type="number" class="form-control" name="pH" step="any" required>
                                </div>
                            </td>
                        </tr>

                        <tr>
                            <td>
                                <div class="form-group">
                                    <label for="Rainfall_mm">Enter Rainfall (in mm)</label>
                                    <input type="number" class="form-control" name="rainfall" step="any" required>
                                </div>
                            </td>

                            <td>
                                <div class="form-group">
                                    <label for="Temperature_C">Enter Temperature (in °C)</label>
                                    <input type="number" class="form-control" name="temperature" step="any" required>
                                </div>
                            </td>
                        </tr>

                    </tbody>
                </table>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success btn-lg predict-btn">
                        Predict Yield
                    </button>
                </div>
            </form>

            {% if predicted_value %}
            <div class="prediction-box mt-4">
                <h2 class="text-center text-success">
                    🌾 Predicted Yield Production
                </h2>
                <h3 class="text-center text-dark">
                    {{ predicted_value }}
                </h3>
            </div>
            {% endif %}

            {% if error %}
            <div class="error-box mt-4">
                <h2 class="text-center text-danger">
                    Error
                </h2>
                <h4 class="text-center">
                    {{ error }}
                </h4>
            </div>
            {% endif %}

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>

</body>

</html>
